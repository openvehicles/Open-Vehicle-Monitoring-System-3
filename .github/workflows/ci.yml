name: CI

on:
  push:
    branches: [vwegolf, master]
  pull_request:
    branches: [master]

# Lock GITHUB_TOKEN to read-only. A compromised action cannot push, create
# releases, or modify the repo. Artifact upload uses an internal Actions
# service token unaffected by this setting.
permissions:
  contents: read

jobs:
  # ── Native unit tests ──────────────────────────────────────────────────────
  # Fast: just g++, no toolchain needed. Fails early before the slow build job.
  test:
    name: Native tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Run native tests
        run: make -C vehicle/OVMS.V3/components/vehicle_vwegolf/tests

  # ── Firmware build ─────────────────────────────────────────────────────────
  build:
    name: Firmware build
    runs-on: ubuntu-24.04
    needs: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          submodules: recursive
          persist-credentials: false

      - name: Install system dependencies
        run: sudo apt-get install -y gperf dos2unix

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/ovms-toolchain
          key: ovms-toolchain-${{ hashFiles('scripts/setup-toolchain.sh') }}
          restore-keys: ovms-toolchain-

      - name: Setup toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: bash scripts/setup-toolchain.sh

      - name: Install Python deps into cached venv
        run: |
          source ~/ovms-toolchain/venv/bin/activate
          pip install -r ~/ovms-toolchain/esp-idf/requirements.txt

      - name: Build firmware
        run: |
          export IDF_PATH=~/ovms-toolchain/esp-idf
          export PATH=~/ovms-toolchain/xtensa-esp32-elf/bin:$PATH
          source ~/ovms-toolchain/venv/bin/activate
          export GNUMAKEFLAGS=
          if [[ ! -f vehicle/OVMS.V3/sdkconfig ]]; then
            cp vehicle/OVMS.V3/support/sdkconfig.default.hw31 vehicle/OVMS.V3/sdkconfig
          fi
          make -C vehicle/OVMS.V3 -j$(nproc)

      - name: Upload firmware artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: ovms3-${{ github.ref_name }}-${{ github.sha }}
          path: vehicle/OVMS.V3/build/ovms3.bin
          retention-days: 30
